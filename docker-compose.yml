services:
  backend:
    build: ./backend
    ports:
      - "8039:8000"
    volumes:
      - ./backend:/app
      - ./data:/data
    environment:
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - DEBUG=True
      - AI_PROVIDER=${AI_PROVIDER:-gemini}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
    command: sh -c "python manage.py migrate && python manage.py seed_default && python manage.py runserver 0.0.0.0:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/documentos/', timeout=2)"]
      interval: 5s
      retries: 15
      start_period: 15s

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_PROXY=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    command: npx vite --host 0.0.0.0 --port 5173
