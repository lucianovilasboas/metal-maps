services:
  backend:
    build: ./backend
    ports:
      - "8039:8000"
    volumes:
      - ./backend:/app
      - ./data:/data
    environment:
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - DEBUG=True
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    command: sh -c "python manage.py migrate && python manage.py seed_default && python manage.py runserver 0.0.0.0:8000"

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_PROXY=http://backend:8000
    depends_on:
      - backend
    command: npx vite --host 0.0.0.0 --port 5173
